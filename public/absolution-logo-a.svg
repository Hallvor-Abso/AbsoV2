<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Absolution — monogramme">
  <defs>
    <linearGradient id="aGrad" x1="60" y1="48" x2="180" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9CD0FF"/>
      <stop offset="1" stop-color="#1A6EFF"/>
    </linearGradient>
    <filter id="aGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4A9EFF" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#aGlow)" stroke="url(#aGrad)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- A épuré : chevron + barre -->
    <path d="M58 188 L120 52 L182 188" stroke-width="24"/>
    <path d="M92 150 L148 150" stroke-width="18"/>
  </g>
</svg>
