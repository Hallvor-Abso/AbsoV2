<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="H">
  <defs>
    <linearGradient id="hGrad" x1="40" y1="20" x2="200" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CC0FF"/>
      <stop offset="1" stop-color="#1A6EFF"/>
    </linearGradient>
    <filter id="hGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4A9EFF" flood-opacity="0.55"/>
    </filter>
  </defs>
  <g filter="url(#hGlow)">
    <!-- Écu / crest (identique à l'emblème de la guilde) -->
    <path d="M120 20 L206 56 L206 120 C206 168 170 206 120 222 C70 206 34 168 34 120 L34 56 Z"
      stroke="url(#hGrad)" stroke-width="8" stroke-linejoin="round"/>
    <!-- Monogramme H, au trait arrondi -->
    <path d="M94 80 L94 168" stroke="url(#hGrad)" stroke-width="14" stroke-linecap="round"/>
    <path d="M146 80 L146 168" stroke="url(#hGrad)" stroke-width="14" stroke-linecap="round"/>
    <path d="M94 124 L146 124" stroke="url(#hGrad)" stroke-width="13" stroke-linecap="round"/>
    <!-- Gemme au sommet -->
    <path d="M120 40 l12 14 l-12 14 l-12 -14 Z" fill="url(#hGrad)"/>
  </g>
</svg>
