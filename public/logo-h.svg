<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fond du badge : dégradé sombre profond -->
    <linearGradient id="bg" x1="80" y1="40" x2="440" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16202e"/>
      <stop offset="0.55" stop-color="#0b111b"/>
      <stop offset="1" stop-color="#05080e"/>
    </linearGradient>
    <!-- Dégradé du H : bleu clair → accent → bleu profond -->
    <linearGradient id="h" x1="150" y1="120" x2="370" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cfe9ff"/>
      <stop offset="0.45" stop-color="#4A9EFF"/>
      <stop offset="1" stop-color="#1f63c7"/>
    </linearGradient>
    <!-- Reflet supérieur subtil -->
    <linearGradient id="sheen" x1="256" y1="40" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.32" r="0.65">
      <stop offset="0" stop-color="#4A9EFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4A9EFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Lueur autour du H -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Découpe = forme du H, pour y poser un reflet -->
    <clipPath id="hclip">
      <path d="M152 126 H210 V232 H302 V126 H360 V386 H302 V290 H210 V386 H152 Z"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <rect x="36" y="36" width="440" height="440" rx="116" fill="url(#bg)"/>
  <rect x="36" y="36" width="440" height="440" rx="116" fill="url(#halo)"/>
  <rect x="36" y="36" width="440" height="440" rx="116" fill="url(#sheen)"/>
  <!-- Bordure accent + liseré interne -->
  <rect x="38.5" y="38.5" width="435" height="435" rx="113.5" stroke="#4A9EFF" stroke-opacity="0.85" stroke-width="3"/>
  <rect x="49" y="49" width="414" height="414" rx="104" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Monogramme H -->
  <g filter="url(#glow)">
    <path d="M152 126 H210 V232 H302 V126 H360 V386 H302 V290 H210 V386 H152 Z" fill="url(#h)"/>
    <!-- Reflet diagonal sur le H -->
    <g clip-path="url(#hclip)">
      <path d="M120 120 L300 120 L150 392 L120 392 Z" fill="#ffffff" fill-opacity="0.18"/>
    </g>
    <!-- Liseré net sur le H -->
    <path d="M152 126 H210 V232 H302 V126 H360 V386 H302 V290 H210 V386 H152 Z"
          stroke="#bfe3ff" stroke-opacity="0.5" stroke-width="2"/>
  </g>
</svg>
