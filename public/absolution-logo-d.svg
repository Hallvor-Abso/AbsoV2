<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Absolution — épées croisées">
  <defs>
    <linearGradient id="dGrad" x1="30" y1="30" x2="210" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CC0FF"/>
      <stop offset="1" stop-color="#1A6EFF"/>
    </linearGradient>
    <filter id="dGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4A9EFF" flood-opacity="0.55"/>
    </filter>
  </defs>
  <g filter="url(#dGlow)" fill="url(#dGrad)">
    <!-- Épée 1 (inclinée) -->
    <g transform="translate(120 134) rotate(40)">
      <path d="M0 -98 L7 -82 L7 -30 L24 -30 L24 -19 L5 -19 L5 10 L-5 10 L-5 -19 L-24 -19 L-24 -30 L-7 -30 L-7 -82 Z"/>
      <circle cx="0" cy="16" r="6.5"/>
    </g>
    <!-- Épée 2 (inclinée, miroir) -->
    <g transform="translate(120 134) rotate(-40)">
      <path d="M0 -98 L7 -82 L7 -30 L24 -30 L24 -19 L5 -19 L5 10 L-5 10 L-5 -19 L-24 -19 L-24 -30 L-7 -30 L-7 -82 Z"/>
      <circle cx="0" cy="16" r="6.5"/>
    </g>
    <!-- Gemme centrale -->
    <path d="M120 70 l18 20 l-18 20 l-18 -20 Z" stroke="#0b0e14" stroke-width="4" stroke-linejoin="round"/>
  </g>
</svg>
