name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck (site)
        run: npx tsc --noEmit

      - name: Lint (site)
        run: npm run lint

      - name: Typecheck (bot)
        run: npm run bot:check

      - name: Classes site ↔ bot synchronisées
        run: npm run check:classes
